<svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 分发连线（向下，实线橙：主线把活拆给三个子代理） -->
<line x1="420" y1="173" x2="200" y2="296" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
<line x1="460" y1="173" x2="460" y2="296" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
<line x1="500" y1="173" x2="720" y2="296" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

<!-- 回摘要连线（向上，虚线蓝：干完只把摘要回给主线） -->
<line x1="230" y1="300" x2="425" y2="177" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
<line x1="490" y1="300" x2="490" y2="177" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
<line x1="690" y1="300" x2="495" y2="177" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>

<!-- 连线标签 -->
<text x="296" y="222" fill="#fb923c" font-size="9" font-weight="500" text-anchor="middle">分发任务</text>
<text x="624" y="222" fill="#60a5fa" font-size="9" font-weight="500" text-anchor="middle">只回摘要</text>

<!-- masking rects（盖住框内连线） -->
<rect x="340" y="95" width="240" height="78" rx="10" fill="#0f172a"/>
<rect x="70" y="300" width="230" height="90" rx="8" fill="#0f172a"/>
<rect x="345" y="300" width="230" height="90" rx="8" fill="#0f172a"/>
<rect x="620" y="300" width="230" height="90" rx="8" fill="#0f172a"/>

<!-- 主线 agent（highlight / blue） -->
<rect x="340" y="95" width="240" height="78" rx="10" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="460" y="128" fill="white" font-size="15" font-weight="700" text-anchor="middle">主线 agent（你这条对话）</text>
<text x="460" y="150" fill="#cbd5e1" font-size="9" text-anchor="middle">拆活 · 等齐结果 · 汇总成一份</text>

<!-- 子代理 1：探路（primary / cyan） -->
<rect x="70" y="300" width="230" height="90" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="185" y="330" fill="white" font-size="12" font-weight="600" text-anchor="middle">子代理 1 · 探路</text>
<text x="185" y="352" fill="#94a3b8" font-size="9" text-anchor="middle">独立上下文 · 互不污染</text>
<text x="185" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">原始细节都留在自己线程里</text>

<!-- 子代理 2：跑测试（secondary / emerald） -->
<rect x="345" y="300" width="230" height="90" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="460" y="330" fill="white" font-size="12" font-weight="600" text-anchor="middle">子代理 2 · 跑测试</text>
<text x="460" y="352" fill="#94a3b8" font-size="9" text-anchor="middle">独立上下文 · 互不污染</text>
<text x="460" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">几百行日志不刷回主线</text>

<!-- 子代理 3：翻文档（tertiary / violet） -->
<rect x="620" y="300" width="230" height="90" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="735" y="330" fill="white" font-size="12" font-weight="600" text-anchor="middle">子代理 3 · 翻文档</text>
<text x="735" y="352" fill="#94a3b8" font-size="9" text-anchor="middle">独立上下文 · 互不污染</text>
<text x="735" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">可单配模型与权限</text>

<!-- 并行标注（三个子代理同时跑） -->
<rect x="70" y="424" width="780" height="36" rx="8" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="8,4"/>
<text x="460" y="446" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">三路并行 · 各自在独立线程里干活，串行三趟变并行一趟</text>

<!-- 标题 -->
<text x="30" y="40" fill="white" font-size="16" font-weight="700">子代理：并行分发，各自独立上下文，只回摘要</text>
<text x="30" y="58" fill="#94a3b8" font-size="9">主线把大任务拆给多个子代理并行干 —— 中间产物留在各自线程，主线只收提炼过的结论</text>

<!-- 底部注解 -->
<text x="460" y="565" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">核心价值：把吵闹的中间产物搬出主线 —— 主线始终清清爽爽</text>
</svg>
