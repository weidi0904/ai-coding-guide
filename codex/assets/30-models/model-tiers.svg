<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 标题 -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">Codex 模型档位 · 按「任务难度 vs 速度成本」摆位</text>
<text x="30" y="62" fill="#94a3b8" font-size="9">模型名以官方 /model 面板为准，可能随版本变动</text>

<!-- 坐标轴：X = 任务难度，Y = 速度/成本 -->
<!-- 绘图区约 x:130~760, y:110~470 -->
<!-- X 轴（底部） -->
<line x1="130" y1="470" x2="775" y2="470" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="455" y="497" fill="#cbd5e1" font-size="11" font-weight="600" text-anchor="middle">任务难度（越往右越硬）</text>
<text x="150" y="490" fill="#94a3b8" font-size="9" text-anchor="middle">简单</text>
<text x="720" y="490" fill="#94a3b8" font-size="9" text-anchor="middle">复杂</text>

<!-- Y 轴（左侧） -->
<line x1="130" y1="470" x2="130" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="86" y="290" fill="#cbd5e1" font-size="11" font-weight="600" text-anchor="middle" transform="rotate(-90 86 290)">速度 / 成本（越往上越快越省）</text>
<text x="118" y="120" fill="#94a3b8" font-size="9" text-anchor="end">快·省</text>
<text x="118" y="463" fill="#94a3b8" font-size="9" text-anchor="end">慢·贵</text>

<!-- 趋势对角线：又快又省 → 又慢又贵（虚线，示意权衡走向） -->
<line x1="175" y1="150" x2="715" y2="430" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,4"/>
<text x="620" y="412" fill="#64748b" font-size="8" text-anchor="middle">越强越慢越贵</text>

<!-- ============ 节点 masking rects（先画 opaque 背景盖住连线/网格） ============ -->
<rect x="150" y="128" width="230" height="92" rx="8" fill="#0f172a"/>
<rect x="245" y="248" width="230" height="92" rx="8" fill="#0f172a"/>
<rect x="540" y="350" width="240" height="100" rx="8" fill="#0f172a"/>

<!-- ============ spark：左上，又快又省、偏纯文本（highlight / blue） ============ -->
<rect x="150" y="128" width="230" height="92" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
<text x="265" y="153" fill="white" font-size="13" font-weight="600" text-anchor="middle">gpt-5.3-codex-spark</text>
<text x="265" y="173" fill="#cbd5e1" font-size="10" text-anchor="middle">近乎实时 · 偏纯文本</text>
<text x="265" y="191" fill="#94a3b8" font-size="9" text-anchor="middle">高频快问快答、连珠炮迭代</text>
<text x="265" y="208" fill="#60a5fa" font-size="9" font-weight="600" text-anchor="middle">极快 / 低 · 能力较弱</text>

<!-- ============ mini：中部，快而省（secondary / emerald） ============ -->
<rect x="245" y="248" width="230" height="92" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="360" y="273" fill="white" font-size="13" font-weight="600" text-anchor="middle">gpt-5.4-mini</text>
<text x="360" y="293" fill="#cbd5e1" font-size="10" text-anchor="middle">轻量 · 快而省</text>
<text x="360" y="311" fill="#94a3b8" font-size="9" text-anchor="middle">改名补注释、子代理批量跑</text>
<text x="360" y="328" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">快 / 低</text>

<!-- ============ gpt-5.5：右下，最强但较慢较贵（alert/旗舰 → 用 rose 强调"最贵"） ============ -->
<rect x="540" y="350" width="240" height="100" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
<text x="660" y="377" fill="white" font-size="14" font-weight="700" text-anchor="middle">gpt-5.5</text>
<text x="660" y="397" fill="#fde68a" font-size="10" font-weight="600" text-anchor="middle">旗舰 · 默认推荐</text>
<text x="660" y="416" fill="#94a3b8" font-size="9" text-anchor="middle">复杂编码、跨模块重构、难缠 bug</text>
<text x="660" y="433" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">较慢 / 最高（最强但最贵）</text>

<!-- ============ 挑选指引（底部一行金句，绘图区之外） ============ -->
<text x="455" y="548" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">挑选指引：默认「旗舰 + medium」打天下，批量脏活降到 mini，要秒回上 spark</text>
<text x="455" y="568" fill="#94a3b8" font-size="9" text-anchor="middle">不确定就先用旗舰，再按「太慢→降档 / 太浅→提推理强度」微调</text>
</svg>
