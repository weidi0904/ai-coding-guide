<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 标题 -->
<text x="30" y="40" fill="white" font-size="16" font-weight="700">Codex 桌面 App · 界面五区示意</text>
<text x="30" y="58" fill="#94a3b8" font-size="9">非真机截图，仅示意分区与各区职责</text>

<!-- ============ App 窗口外框（neutral 描边，整窗轮廓） ============ -->
<rect x="40" y="80" width="820" height="468" rx="12" fill="#0f172a"/>
<rect x="40" y="80" width="820" height="468" rx="12" fill="rgba(30,41,59,0.35)" stroke="#94a3b8" stroke-width="1.5"/>

<!-- 窗口左上角三个红绿灯按钮（macOS 风，纯装饰） -->
<circle cx="62" cy="100" r="5" fill="#fb7185"/>
<circle cx="78" cy="100" r="5" fill="#fbbf24"/>
<circle cx="94" cy="100" r="5" fill="#34d399"/>

<!-- ============ ① 顶部状态栏（highlight / blue） ============ -->
<!-- mask -->
<rect x="56" y="114" width="788" height="40" rx="6" fill="#0f172a"/>
<rect x="56" y="114" width="788" height="40" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
<text x="72" y="139" fill="white" font-size="11" font-weight="600" text-anchor="start">① 顶部状态栏</text>
<text x="828" y="139" fill="#cbd5e1" font-size="9" text-anchor="end">项目名 · 运行模式 · 模型 · Actions 一键按钮</text>

<!-- ============ ② 左侧项目 / 线程列表（primary / cyan） ============ -->
<!-- mask -->
<rect x="56" y="170" width="190" height="320" rx="6" fill="#0f172a"/>
<rect x="56" y="170" width="190" height="320" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="151" y="196" fill="white" font-size="11" font-weight="600" text-anchor="middle">② 项目 / 线程列表</text>
<text x="151" y="213" fill="#94a3b8" font-size="9" text-anchor="middle">左边栏 · 导航总台</text>
<!-- 列表条目（纯装饰，示意多个并行线程） -->
<rect x="74" y="232" width="154" height="24" rx="4" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="0.8"/>
<text x="84" y="248" fill="#cbd5e1" font-size="9" text-anchor="start">＋ 新线程</text>
<rect x="74" y="266" width="154" height="24" rx="4" fill="none" stroke="#334155" stroke-width="0.8"/>
<text x="84" y="282" fill="#94a3b8" font-size="9" text-anchor="start">线程 · 修 bug</text>
<rect x="74" y="300" width="154" height="24" rx="4" fill="none" stroke="#334155" stroke-width="0.8"/>
<text x="84" y="316" fill="#94a3b8" font-size="9" text-anchor="start">线程 · 补测试</text>
<rect x="74" y="334" width="154" height="24" rx="4" fill="none" stroke="#334155" stroke-width="0.8"/>
<text x="84" y="350" fill="#94a3b8" font-size="9" text-anchor="start">线程 · 跑长任务</text>
<text x="151" y="392" fill="#64748b" font-size="8" text-anchor="middle">搜索 · 插件 · 自动化</text>
<text x="151" y="408" fill="#64748b" font-size="8" text-anchor="middle">项目 · 普通对话</text>

<!-- ============ ③ 中间对话区（secondary / emerald） ============ -->
<!-- mask -->
<rect x="262" y="170" width="290" height="320" rx="6" fill="#0f172a"/>
<rect x="262" y="170" width="290" height="320" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="407" y="196" fill="white" font-size="11" font-weight="600" text-anchor="middle">③ 中间对话区</text>
<text x="407" y="213" fill="#94a3b8" font-size="9" text-anchor="middle">跟 Codex 对话、下指令的主战场</text>
<!-- 对话气泡（纯装饰） -->
<rect x="282" y="234" width="180" height="34" rx="6" fill="rgba(52,211,153,0.12)" stroke="#334155" stroke-width="0.8"/>
<text x="294" y="255" fill="#cbd5e1" font-size="9" text-anchor="start">你：把这处 TODO 实现掉</text>
<rect x="352" y="284" width="180" height="50" rx="6" fill="rgba(148,163,184,0.10)" stroke="#334155" stroke-width="0.8"/>
<text x="364" y="305" fill="#cbd5e1" font-size="9" text-anchor="start">Codex：读 src/auth.ts …</text>
<text x="364" y="321" fill="#94a3b8" font-size="9" text-anchor="start">已改 2 个文件，待审阅 →</text>
<!-- 底部输入框 -->
<rect x="282" y="438" width="250" height="34" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
<text x="294" y="459" fill="#64748b" font-size="9" text-anchor="start">输入指令…  模式▾ 模型▾ 权限▾</text>

<!-- ============ ④ 右侧 diff 审查面板（tertiary / violet） ============ -->
<!-- mask -->
<rect x="568" y="170" width="276" height="150" rx="6" fill="#0f172a"/>
<rect x="568" y="170" width="276" height="150" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="706" y="196" fill="white" font-size="11" font-weight="600" text-anchor="middle">④ Diff 审查面板</text>
<text x="706" y="213" fill="#94a3b8" font-size="9" text-anchor="middle">逐行批注 · 按块接受 / 回滚 · 开 PR</text>
<!-- diff 行（绿加红示意） -->
<rect x="586" y="228" width="240" height="18" rx="3" fill="rgba(52,211,153,0.14)"/>
<text x="596" y="241" fill="#34d399" font-size="9" text-anchor="start">+  const MAX_RETRY = 3;</text>
<rect x="586" y="250" width="240" height="18" rx="3" fill="rgba(251,113,133,0.14)"/>
<text x="596" y="263" fill="#fb7185" font-size="9" text-anchor="start">-  let n = 3; // 魔法数字</text>
<rect x="586" y="272" width="240" height="18" rx="3" fill="rgba(52,211,153,0.14)"/>
<text x="596" y="285" fill="#34d399" font-size="9" text-anchor="start">+  return MAX_RETRY;</text>
<text x="706" y="307" fill="#64748b" font-size="8" text-anchor="middle">未提交 / 全分支 / 最近一轮 可切</text>

<!-- ============ ⑤ 右侧内置终端（connector / orange） ============ -->
<!-- mask -->
<rect x="568" y="336" width="276" height="154" rx="6" fill="#0f172a"/>
<rect x="568" y="336" width="276" height="154" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fb923c" stroke-width="1.5"/>
<text x="706" y="362" fill="white" font-size="11" font-weight="600" text-anchor="middle">⑤ 内置终端</text>
<text x="706" y="379" fill="#94a3b8" font-size="9" text-anchor="middle">与 Codex 共享同一工作目录</text>
<!-- 终端行（纯装饰） -->
<text x="586" y="406" fill="#fb923c" font-size="9" text-anchor="start">$ npm test</text>
<text x="586" y="424" fill="#94a3b8" font-size="9" text-anchor="start">  PASS  auth.test.ts</text>
<text x="586" y="442" fill="#94a3b8" font-size="9" text-anchor="start">  Tests: 12 passed</text>
<text x="586" y="466" fill="#34d399" font-size="9" text-anchor="start">$ _</text>

<!-- ============ ⑥ 底部状态栏（neutral / slate） ============ -->
<!-- mask -->
<rect x="56" y="506" width="788" height="30" rx="6" fill="#0f172a"/>
<rect x="56" y="506" width="788" height="30" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
<text x="72" y="525" fill="#cbd5e1" font-size="9" text-anchor="start">⑥ 底部状态栏</text>
<text x="828" y="525" fill="#94a3b8" font-size="9" text-anchor="end">分支 · token 用量 · /status 仪表 · 连接状态</text>

<!-- ============ 底部注解 ============ -->
<text x="450" y="578" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">左挑去哪 → 中间对话下指令 → 右边面板看结果（diff 在上、终端在下）</text>
</svg>
