<svg viewBox="0 0 780 720" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- ===== 连线（先画，后面用 masking rect 盖住框内段） ===== -->
<!-- A → B 主线 -->
<line x1="400" y1="154" x2="400" y2="196" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- B → C 主线 -->
<line x1="400" y1="280" x2="400" y2="322" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- C → D 主线 -->
<line x1="400" y1="414" x2="400" y2="456" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- D → A 反馈回环：修改后再次进入流程（走右侧，虚线） -->
<path d="M 560 540 C 690 540, 690 122, 540 122" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
<text x="700" y="334" fill="#94a3b8" font-size="9" text-anchor="middle">@codex fix</text>
<text x="700" y="348" fill="#94a3b8" font-size="9" text-anchor="middle">改完再审</text>
<!-- 自动审查侧线：从左侧汇入 B -->
<line x1="220" y1="240" x2="246" y2="240" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

<!-- ===== masking rects（opaque，盖住框内连线） ===== -->
<rect x="270" y="90" width="260" height="64" rx="25" fill="#0f172a"/>
<rect x="246" y="196" width="308" height="84" rx="8" fill="#0f172a"/>
<rect x="240" y="322" width="320" height="92" rx="8" fill="#0f172a"/>
<rect x="240" y="456" width="320" height="84" rx="8" fill="#0f172a"/>
<rect x="40" y="208" width="180" height="64" rx="8" fill="#0f172a"/>

<!-- ===== 组件框 + 文字 ===== -->

<!-- A：PR 创建/更新（start，highlight / blue） -->
<rect x="270" y="90" width="260" height="64" rx="25" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="400" y="118" fill="white" font-size="13" font-weight="600" text-anchor="middle">PR 创建 / 更新</text>
<text x="400" y="138" fill="#cbd5e1" font-size="9" text-anchor="middle">开一个 Pull Request，或推新 commit</text>

<!-- B：召唤审查（process，primary / cyan） -->
<rect x="246" y="196" width="308" height="84" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="400" y="224" fill="white" font-size="13" font-weight="600" text-anchor="middle">召唤审查</text>
<text x="400" y="246" fill="#94a3b8" font-size="9" text-anchor="middle">评论里打一句 @codex review</text>
<text x="400" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">先回个反应表示「收到，开始看」</text>

<!-- 自动审查（左侧小框，secondary / emerald 虚线意味「另一条触发路径」） -->
<rect x="40" y="208" width="180" height="64" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="130" y="234" fill="white" font-size="11" font-weight="600" text-anchor="middle">自动审查</text>
<text x="130" y="252" fill="#94a3b8" font-size="9" text-anchor="middle">开 Automatic reviews</text>
<text x="130" y="266" fill="#94a3b8" font-size="9" text-anchor="middle">新 PR 自动触发</text>

<!-- C：读 diff、对照规矩（process，secondary / emerald） -->
<rect x="240" y="322" width="320" height="92" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="400" y="350" fill="white" font-size="13" font-weight="600" text-anchor="middle">云端读 diff · 对照审查规矩</text>
<text x="400" y="372" fill="#94a3b8" font-size="9" text-anchor="middle">Codex cloud 拉起任务，读这个 PR 的改动</text>
<text x="400" y="388" fill="#94a3b8" font-size="9" text-anchor="middle">按 AGENTS.md 的 Review guidelines 挑</text>
<text x="400" y="404" fill="#94a3b8" font-size="9" text-anchor="middle">就近取离改动文件最近的那份规矩</text>

<!-- D：发出审查评论（output，accent / amber） -->
<rect x="240" y="456" width="320" height="84" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="400" y="484" fill="white" font-size="13" font-weight="600" text-anchor="middle">发出审查评论</text>
<text x="400" y="506" fill="#94a3b8" font-size="9" text-anchor="middle">像队友一样把问题挂在对应代码行上</text>
<text x="400" y="522" fill="#fbbf24" font-size="9" font-weight="500" text-anchor="middle">GitHub 侧只标 P0 / P1 高优先级，不刷 nit</text>

<!-- ===== 标题 ===== -->
<text x="30" y="40" fill="white" font-size="16" font-weight="700">@codex review · GitHub 代码审查流程</text>
<text x="30" y="58" fill="#94a3b8" font-size="9">PR 一动 → 召唤（或自动）→ 读 diff 对规矩 → 挂 P0/P1 评论 → fix 后回头再审</text>

<!-- ===== 图例 ===== -->
<text x="30" y="640" fill="#94a3b8" font-size="9" font-weight="600">图例</text>
<line x1="30" y1="660" x2="58" y2="660" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="66" y="664" fill="#94a3b8" font-size="9">主流程</text>
<line x1="160" y1="660" x2="188" y2="660" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text x="196" y="664" fill="#94a3b8" font-size="9">自动触发（可选）</text>
<line x1="340" y1="660" x2="368" y2="660" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
<text x="376" y="664" fill="#94a3b8" font-size="9">修复后回头再审</text>
</svg>
