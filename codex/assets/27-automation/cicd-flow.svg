<svg viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
  </marker>
  <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- ============ 连线层（先画，后被 masking rect 盖住框内部分） ============ -->
<!-- 三个事件 → 触发 workflow（汇入中间偏左） -->
<path d="M 250 135 L 290 135 Q 305 135 305 150 L 305 250 Q 305 265 320 265" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="250" y1="265" x2="320" y2="265" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 250 395 L 290 395 Q 305 395 305 380 L 305 280 Q 305 265 320 265" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 触发 workflow → codex exec（核心一步，蓝色高亮） -->
<line x1="500" y1="265" x2="540" y2="265" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

<!-- codex exec → 三个产出（从中间发散，绿色） -->
<path d="M 730 265 Q 745 265 745 250 L 745 150 Q 745 135 760 135" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
<line x1="730" y1="265" x2="760" y2="265" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
<path d="M 730 265 Q 745 265 745 280 L 745 380 Q 745 395 760 395" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

<!-- ============ masking rects（opaque，盖住框内连线） ============ -->
<rect x="60" y="100" width="190" height="70" rx="6" fill="#0f172a"/>
<rect x="60" y="230" width="190" height="70" rx="6" fill="#0f172a"/>
<rect x="60" y="360" width="190" height="70" rx="6" fill="#0f172a"/>
<rect x="320" y="230" width="180" height="70" rx="6" fill="#0f172a"/>
<rect x="540" y="222" width="190" height="86" rx="8" fill="#0f172a"/>
<rect x="760" y="100" width="180" height="70" rx="6" fill="#0f172a"/>
<rect x="760" y="230" width="180" height="70" rx="6" fill="#0f172a"/>
<rect x="760" y="360" width="180" height="70" rx="6" fill="#0f172a"/>

<!-- ============ 组件框 + 文字 ============ -->
<!-- 左列：GitHub 事件（primary / cyan） -->
<rect x="60" y="100" width="190" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="155" y="130" fill="white" font-size="12" font-weight="600" text-anchor="middle">push 推代码</text>
<text x="155" y="148" fill="#94a3b8" font-size="9" text-anchor="middle">提交进了仓库</text>

<rect x="60" y="230" width="190" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="155" y="260" fill="white" font-size="12" font-weight="600" text-anchor="middle">Pull Request</text>
<text x="155" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">开 PR / 推新提交</text>

<rect x="60" y="360" width="190" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="155" y="390" fill="white" font-size="12" font-weight="600" text-anchor="middle">定时 cron</text>
<text x="155" y="408" fill="#94a3b8" font-size="9" text-anchor="middle">按周期到点跑</text>

<!-- 中间：触发 workflow（connector / orange） -->
<rect x="320" y="230" width="180" height="70" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
<text x="410" y="260" fill="white" font-size="12" font-weight="600" text-anchor="middle">触发 workflow</text>
<text x="410" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">on: 事件命中</text>

<!-- 核心：codex exec（highlight / blue） -->
<rect x="540" y="222" width="190" height="86" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="635" y="256" fill="white" font-size="14" font-weight="700" text-anchor="middle">codex exec</text>
<text x="635" y="276" fill="#cbd5e1" font-size="9" text-anchor="middle">非交互 · 按指定权限</text>
<text x="635" y="291" fill="#cbd5e1" font-size="9" text-anchor="middle">sandbox 沙箱兜底</text>

<!-- 右列：产出（secondary / emerald） -->
<rect x="760" y="100" width="180" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="850" y="130" fill="white" font-size="12" font-weight="600" text-anchor="middle">审查评论</text>
<text x="850" y="148" fill="#94a3b8" font-size="9" text-anchor="middle">贴回 PR</text>

<rect x="760" y="230" width="180" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="850" y="260" fill="white" font-size="12" font-weight="600" text-anchor="middle">代码修改</text>
<text x="850" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">提补丁 / 修 CI</text>

<rect x="760" y="360" width="180" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="850" y="390" fill="white" font-size="12" font-weight="600" text-anchor="middle">报告 / 简报</text>
<text x="850" y="408" fill="#94a3b8" font-size="9" text-anchor="middle">final-message 输出</text>

<!-- ============ 标题 ============ -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">GitHub Action：事件触发，自动跑 codex exec</text>
<text x="30" y="62" fill="#94a3b8" font-size="9">仓库一有动静，云端 runner 自动上岗，跑完吐产出</text>

<!-- ============ 底部分组注解 ============ -->
<text x="155" y="468" fill="#22d3ee" font-size="10" font-weight="500" text-anchor="middle">① 谁来触发（仓库事件）</text>
<text x="465" y="468" fill="#fb923c" font-size="10" font-weight="500" text-anchor="middle">② 在云端 runner 上跑</text>
<text x="850" y="468" fill="#34d399" font-size="10" font-weight="500" text-anchor="middle">③ 吐出产出</text>
</svg>
