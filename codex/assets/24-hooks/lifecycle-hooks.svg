<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
  </marker>
  <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 生命周期主轴边界（虚线圈住中间这一列固定点） -->
<rect x="120" y="70" width="260" height="448" rx="14" fill="none" stroke="#475569" stroke-width="1.2" stroke-dasharray="8,4"/>
<text x="135" y="92" fill="#94a3b8" font-size="10" font-weight="600">Codex 一次会话的生命周期（从上往下）</text>

<!-- 主轴连线：四个固定点自上而下串起来 -->
<line x1="250" y1="160" x2="250" y2="208" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow-slate)"/>
<line x1="250" y1="280" x2="250" y2="328" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow-slate)"/>
<line x1="250" y1="400" x2="250" y2="448" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow-slate)"/>

<!-- 横向虚线：每个固定点「到点」就把挂着的脚本拉起来跑 -->
<line x1="350" y1="126" x2="552" y2="126" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
<line x1="350" y1="246" x2="552" y2="246" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
<line x1="350" y1="366" x2="552" y2="366" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
<line x1="350" y1="486" x2="552" y2="486" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>

<!-- masking rects（盖住框内 / 框边的连线） -->
<rect x="150" y="98" width="200" height="62" rx="22" fill="#0f172a"/>
<rect x="150" y="208" width="200" height="62" rx="8" fill="#0f172a"/>
<rect x="150" y="328" width="200" height="62" rx="8" fill="#0f172a"/>
<rect x="150" y="448" width="200" height="62" rx="22" fill="#0f172a"/>
<rect x="555" y="96" width="210" height="64" rx="8" fill="#0f172a"/>
<rect x="555" y="216" width="210" height="64" rx="8" fill="#0f172a"/>
<rect x="555" y="336" width="210" height="64" rx="8" fill="#0f172a"/>
<rect x="555" y="456" width="210" height="64" rx="8" fill="#0f172a"/>

<!-- 固定点 1：会话开始（highlight / blue，起点用大圆角） -->
<rect x="150" y="98" width="200" height="62" rx="22" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="250" y="124" fill="white" font-size="13" font-weight="600" text-anchor="middle">会话开始</text>
<text x="250" y="143" fill="#cbd5e1" font-size="9.5" text-anchor="middle">SessionStart</text>

<!-- 固定点 2：工具调用前（primary / cyan，能拦） -->
<rect x="150" y="208" width="200" height="62" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="250" y="234" fill="white" font-size="13" font-weight="600" text-anchor="middle">工具调用前</text>
<text x="250" y="253" fill="#94a3b8" font-size="9.5" text-anchor="middle">PreToolUse · 能拦</text>

<!-- 固定点 3：工具调用后（secondary / emerald，补刀） -->
<rect x="150" y="328" width="200" height="62" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="250" y="354" fill="white" font-size="13" font-weight="600" text-anchor="middle">工具调用后</text>
<text x="250" y="373" fill="#94a3b8" font-size="9.5" text-anchor="middle">PostToolUse · 补刀</text>

<!-- 固定点 4：会话结束（highlight / blue，终点用大圆角） -->
<rect x="150" y="448" width="200" height="62" rx="22" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="250" y="474" fill="white" font-size="13" font-weight="600" text-anchor="middle">会话结束</text>
<text x="250" y="493" fill="#cbd5e1" font-size="9.5" text-anchor="middle">Stop</text>

<!-- 挂载的 hook 脚本 1（accent / amber） -->
<rect x="555" y="96" width="210" height="64" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="660" y="123" fill="white" font-size="12" font-weight="600" text-anchor="middle">hook 脚本：注入上下文</text>
<text x="660" y="142" fill="#94a3b8" font-size="9" text-anchor="middle">如把最近的提交喂给模型</text>

<!-- 挂载的 hook 脚本 2（accent / amber） -->
<rect x="555" y="216" width="210" height="64" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="660" y="243" fill="white" font-size="12" font-weight="600" text-anchor="middle">hook 脚本：拦危险命令</text>
<text x="660" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">exit 2 把这次调用挡下</text>

<!-- 挂载的 hook 脚本 3（accent / amber） -->
<rect x="555" y="336" width="210" height="64" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="660" y="363" fill="white" font-size="12" font-weight="600" text-anchor="middle">hook 脚本：自动格式化</text>
<text x="660" y="382" fill="#94a3b8" font-size="9" text-anchor="middle">改完文件就跑 ruff / prettier</text>

<!-- 挂载的 hook 脚本 4（accent / amber） -->
<rect x="555" y="456" width="210" height="64" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="660" y="483" fill="white" font-size="12" font-weight="600" text-anchor="middle">hook 脚本：收尾检查</text>
<text x="660" y="502" fill="#94a3b8" font-size="9" text-anchor="middle">如让它再补跑一遍测试</text>

<!-- 横向连线标签：到点自动跑 -->
<text x="451" y="118" fill="#fbbf24" font-size="8.5" font-weight="500" text-anchor="middle">到点自动跑</text>
<text x="451" y="238" fill="#fbbf24" font-size="8.5" font-weight="500" text-anchor="middle">到点自动跑</text>
<text x="451" y="358" fill="#fbbf24" font-size="8.5" font-weight="500" text-anchor="middle">到点自动跑</text>
<text x="451" y="478" fill="#fbbf24" font-size="8.5" font-weight="500" text-anchor="middle">到点自动跑</text>

<!-- 标题 -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">Codex · 钩子挂在生命周期的固定点上</text>
<text x="30" y="60" fill="#94a3b8" font-size="9.5">会话开始 / 工具调用前 / 工具调用后 / 会话结束 —— 每个点各挂一个脚本，到点就自动开火</text>

<!-- 底部注解 -->
<text x="450" y="606" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">钩子是「扳机」：你不用记、也不用手动点 —— 流程一走到那个点，挂着的脚本必然触发</text>
</svg>
