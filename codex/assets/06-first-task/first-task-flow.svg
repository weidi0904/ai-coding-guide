<svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
  </marker>
  <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- ===== 连线层（先画，后面用 masking rect 盖住穿框部分） ===== -->
<!-- 提需求 → Codex 分析 -->
<line x1="320" y1="146" x2="320" y2="196" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Codex 分析 → 在沙箱里改文件 -->
<line x1="320" y1="276" x2="320" y2="326" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- 改文件 → 审 diff -->
<line x1="320" y1="426" x2="320" y2="470" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
<!-- 审 diff →（满意）留下 -->
<line x1="320" y1="566" x2="320" y2="616" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
<!-- 审 diff →（有问题）退回：向右出去再下来 -->
<line x1="408" y1="518" x2="565" y2="518" stroke="#fb7185" stroke-width="1.6" marker-end="url(#arrow-rose)"/>
<!-- 退回 → 回到「在沙箱里改文件」（loop-back，走右侧上行再插回） -->
<path d="M 565 580 L 640 580 L 640 376 L 425 376" fill="none" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-rose)"/>
<!-- 出圈动作分支：从「改文件」框右侧拉出到「停下来问你」 -->
<line x1="425" y1="358" x2="555" y2="358" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-rose)"/>

<!-- ===== 工作区圈内 region boundary（虚线框，盖住「在沙箱里改文件」） ===== -->
<rect x="180" y="306" width="280" height="120" rx="12" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
<text x="196" y="324" fill="#fbbf24" font-size="9" font-weight="600">工作区圈内 · workspace-write 沙箱</text>

<!-- ===== masking rects（盖住框内穿过的连线，fill #0f172a） ===== -->
<rect x="200" y="90" width="240" height="56" rx="6" fill="#0f172a"/>
<rect x="200" y="196" width="240" height="80" rx="6" fill="#0f172a"/>
<rect x="200" y="338" width="240" height="76" rx="6" fill="#0f172a"/>
<rect x="555" y="328" width="180" height="62" rx="6" fill="#0f172a"/>
<rect x="200" y="616" width="240" height="72" rx="6" fill="#0f172a"/>
<rect x="555" y="548" width="180" height="64" rx="6" fill="#0f172a"/>

<!-- ===== 组件层 ===== -->

<!-- 1. 提需求（primary / cyan） -->
<rect x="200" y="90" width="240" height="56" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="320" y="115" fill="white" font-size="13" font-weight="600" text-anchor="middle">① 提需求</text>
<text x="320" y="134" fill="#94a3b8" font-size="9" text-anchor="middle">用大白话说清要干嘛、怎么算完成</text>

<!-- 2. Codex 分析（secondary / emerald） -->
<rect x="200" y="196" width="240" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="320" y="226" fill="white" font-size="13" font-weight="600" text-anchor="middle">② Codex 分析</text>
<text x="320" y="246" fill="#94a3b8" font-size="9" text-anchor="middle">想→做→看 的代理循环</text>
<text x="320" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">自己读相关文件、定方案</text>

<!-- 3. 在沙箱里改文件（secondary / emerald，圈内） -->
<rect x="200" y="338" width="240" height="76" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="320" y="366" fill="white" font-size="13" font-weight="600" text-anchor="middle">③ 在沙箱里改文件</text>
<text x="320" y="386" fill="#94a3b8" font-size="9" text-anchor="middle">圈内动作 · 直接落盘</text>
<text x="320" y="402" fill="#86efac" font-size="9" text-anchor="middle">不每次弹窗问你</text>

<!-- 旁支：出圈动作（alert / rose） -->
<rect x="555" y="328" width="180" height="62" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
<text x="645" y="354" fill="white" font-size="12" font-weight="600" text-anchor="middle">出圈动作</text>
<text x="645" y="372" fill="#fda4af" font-size="9" text-anchor="middle">改圈外文件 / 联网</text>
<text x="645" y="386" fill="#fda4af" font-size="9" text-anchor="middle">→ 停下来先问你</text>

<!-- 4. 审 diff 验收（decision diamond / amber） -->
<g transform="translate(320, 518)">
  <polygon points="0,-48 88,0 0,48 -88,0" fill="#0f172a"/>
  <polygon points="0,-48 88,0 0,48 -88,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="0" y="-8" fill="white" font-size="13" font-weight="700" text-anchor="middle">④ 审 diff</text>
  <text x="0" y="10" fill="#fcd34d" font-size="9" text-anchor="middle">改对没·认不认</text>
  <text x="0" y="24" fill="#fcd34d" font-size="9" text-anchor="middle">删错没</text>
</g>

<!-- 5a. 留下（happy path / highlight blue） -->
<rect x="200" y="616" width="240" height="72" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.8"/>
<text x="320" y="644" fill="white" font-size="13" font-weight="600" text-anchor="middle">⑤ 留下改动</text>
<text x="320" y="664" fill="#bfdbfe" font-size="9" text-anchor="middle">满意 → git commit</text>
<text x="320" y="680" fill="#bfdbfe" font-size="9" text-anchor="middle">收进版本</text>

<!-- 5b. 退回（alert / rose） -->
<rect x="555" y="548" width="180" height="64" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
<text x="645" y="574" fill="white" font-size="12" font-weight="600" text-anchor="middle">退回</text>
<text x="645" y="592" fill="#fda4af" font-size="9" text-anchor="middle">补一句话让它改</text>
<text x="645" y="606" fill="#fda4af" font-size="9" text-anchor="middle">或 git restore</text>

<!-- ===== 分支标签 ===== -->
<text x="332" y="592" fill="#34d399" font-size="9" font-weight="500">满意</text>
<text x="468" y="510" fill="#fb7185" font-size="9" font-weight="500">有问题</text>

<!-- ===== 标题 ===== -->
<text x="30" y="40" fill="white" font-size="16" font-weight="700">第一个任务的完整流程</text>
<text x="30" y="58" fill="#94a3b8" font-size="9">圈内改文件直接落盘，只有出圈动作才停下来问 —— 你靠审 diff 事后把关</text>

<!-- ===== 底部图例 ===== -->
<rect x="30" y="678" width="14" height="10" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.2"/>
<text x="50" y="687" fill="#94a3b8" font-size="9">圈内 · 直接做</text>
<rect x="150" y="678" width="14" height="10" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.2"/>
<text x="170" y="687" fill="#94a3b8" font-size="9">出圈 · 先问你</text>
</svg>
