<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 标题 -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">权限的两个独立旋钮：沙箱档 × 审批档</text>
<text x="30" y="62" fill="#94a3b8" font-size="9">横轴决定「能动多大」，纵轴决定「问不问你」——两两组合出你感受到的松紧</text>

<!-- ===== 坐标轴 ===== -->
<!-- 横轴（沙箱：从严到松，向右） -->
<line x1="200" y1="120" x2="900" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
<text x="200" y="108" fill="#cbd5e1" font-size="11" font-weight="600">沙箱模式 sandbox（能动多大 →）</text>
<text x="880" y="108" fill="#64748b" font-size="8" text-anchor="end">从严 → 松</text>

<!-- 纵轴（审批：向下） -->
<line x1="160" y1="135" x2="160" y2="495" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
<text x="150" y="135" fill="#cbd5e1" font-size="11" font-weight="600" transform="rotate(90 150 135)">审批策略 approval（问不问你 ↓）</text>

<!-- ===== 横轴列标题（顶部） ===== -->
<text x="290" y="146" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">read-only</text>
<text x="290" y="159" fill="#64748b" font-size="8" text-anchor="middle">只读</text>
<text x="510" y="146" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">workspace-write</text>
<text x="510" y="159" fill="#64748b" font-size="8" text-anchor="middle">工作区可写</text>
<text x="745" y="146" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">danger-full-access</text>
<text x="745" y="159" fill="#64748b" font-size="8" text-anchor="middle">完全访问</text>

<!-- ===== 纵轴行标题（左侧） ===== -->
<text x="148" y="218" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="end">untrusted</text>
<text x="148" y="231" fill="#64748b" font-size="8" text-anchor="end">最谨慎</text>
<text x="148" y="318" fill="#60a5fa" font-size="11" font-weight="600" text-anchor="end">on-request</text>
<text x="148" y="331" fill="#64748b" font-size="8" text-anchor="end">平衡档</text>
<text x="148" y="418" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="end">never</text>
<text x="148" y="431" fill="#64748b" font-size="8" text-anchor="end">不打扰</text>

<!-- ============================================================ -->
<!-- 9 个组合单元格：先 masking rect，再半透明框，再文字          -->
<!-- 列 x：read-only 200 / workspace-write 410 / full 645         -->
<!-- 行 y：untrusted 180 / on-request 280 / never 380             -->
<!-- 列宽 180/190/200，行高 80，行间距 20                          -->
<!-- ============================================================ -->

<!-- 行 1：untrusted -->
<rect x="200" y="178" width="180" height="80" rx="6" fill="#0f172a"/>
<rect x="200" y="178" width="180" height="80" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.2"/>
<text x="290" y="208" fill="#cbd5e1" font-size="10" font-weight="600" text-anchor="middle">只读 + 步步问</text>
<text x="290" y="226" fill="#64748b" font-size="8" text-anchor="middle">最保守</text>
<text x="290" y="242" fill="#64748b" font-size="8" text-anchor="middle">陌生项目通读</text>

<rect x="410" y="178" width="200" height="80" rx="6" fill="#0f172a"/>
<rect x="410" y="178" width="200" height="80" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.2"/>
<text x="510" y="208" fill="#cbd5e1" font-size="10" font-weight="600" text-anchor="middle">可写 + 步步问</text>
<text x="510" y="226" fill="#64748b" font-size="8" text-anchor="middle">最碎，谨慎放手</text>
<text x="510" y="242" fill="#64748b" font-size="8" text-anchor="middle">动真格才拦</text>

<rect x="645" y="178" width="200" height="80" rx="6" fill="#0f172a"/>
<rect x="645" y="178" width="200" height="80" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.2"/>
<text x="745" y="208" fill="#fecdd3" font-size="10" font-weight="600" text-anchor="middle">全权 + 步步问</text>
<text x="745" y="226" fill="#94a3b8" font-size="8" text-anchor="middle">能动整机但每步问</text>
<text x="745" y="242" fill="#94a3b8" font-size="8" text-anchor="middle">少见组合</text>

<!-- 行 2：on-request —— 含黄金组合高亮 -->
<rect x="200" y="278" width="180" height="80" rx="6" fill="#0f172a"/>
<rect x="200" y="278" width="180" height="80" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.2"/>
<text x="290" y="308" fill="#cbd5e1" font-size="10" font-weight="600" text-anchor="middle">只读 + 自动</text>
<text x="290" y="326" fill="#64748b" font-size="8" text-anchor="middle">读它随便读</text>
<text x="290" y="342" fill="#64748b" font-size="8" text-anchor="middle">写就拦</text>

<!-- 黄金组合（highlight / blue，加粗描边 + 角标） -->
<rect x="410" y="278" width="200" height="80" rx="8" fill="#0f172a"/>
<rect x="410" y="278" width="200" height="80" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2.5"/>
<text x="510" y="306" fill="white" font-size="11" font-weight="700" text-anchor="middle">日常黄金组合 ★</text>
<text x="510" y="324" fill="#dbeafe" font-size="8" text-anchor="middle">圈内放手改</text>
<text x="510" y="340" fill="#dbeafe" font-size="8" text-anchor="middle">出圈才喊你 · 低打扰</text>

<rect x="645" y="278" width="200" height="80" rx="6" fill="#0f172a"/>
<rect x="645" y="278" width="200" height="80" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.2"/>
<text x="745" y="308" fill="#fecdd3" font-size="10" font-weight="600" text-anchor="middle">全权 + 自动</text>
<text x="745" y="326" fill="#94a3b8" font-size="8" text-anchor="middle">出圈才问</text>
<text x="745" y="342" fill="#94a3b8" font-size="8" text-anchor="middle">但圈已是整机</text>

<!-- 行 3：never -->
<rect x="200" y="378" width="180" height="80" rx="6" fill="#0f172a"/>
<rect x="200" y="378" width="180" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.2"/>
<text x="290" y="408" fill="#cbd5e1" font-size="10" font-weight="600" text-anchor="middle">只读 + 不问</text>
<text x="290" y="426" fill="#64748b" font-size="8" text-anchor="middle">CI 只读分析</text>
<text x="290" y="442" fill="#34d399" font-size="8" text-anchor="middle">安全的全自动</text>

<rect x="410" y="378" width="200" height="80" rx="6" fill="#0f172a"/>
<rect x="410" y="378" width="200" height="80" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.2"/>
<text x="510" y="408" fill="#cbd5e1" font-size="10" font-weight="600" text-anchor="middle">可写 + 不问</text>
<text x="510" y="426" fill="#64748b" font-size="8" text-anchor="middle">圈内全自动</text>
<text x="510" y="442" fill="#64748b" font-size="8" text-anchor="middle">出圈直接做</text>

<!-- 完全放飞（danger x never）= yolo，红框警示 -->
<rect x="645" y="378" width="200" height="80" rx="6" fill="#0f172a"/>
<rect x="645" y="378" width="200" height="80" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="2.5"/>
<text x="745" y="406" fill="#fecdd3" font-size="10" font-weight="700" text-anchor="middle">--yolo 完全放飞 ⚠</text>
<text x="745" y="424" fill="#fda4af" font-size="8" text-anchor="middle">拆沙箱 + 关审批</text>
<text x="745" y="440" fill="#fda4af" font-size="8" text-anchor="middle">只在隔离容器里碰</text>

<!-- ===== 图例（底部，所有内容之下 20px+） ===== -->
<rect x="200" y="498" width="14" height="14" rx="3" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="222" y="509" fill="#cbd5e1" font-size="9">★ 日常推荐：workspace-write + on-request</text>

<rect x="540" y="498" width="14" height="14" rx="3" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="2"/>
<text x="562" y="509" fill="#cbd5e1" font-size="9">⚠ 完全访问一列：name 带 danger，本机生产机免谈</text>

<!-- 底部注解 -->
<text x="480" y="546" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">两个旋钮各拧各的：「能动整机」≠「不弹窗」，松紧是这两轴组合出来的</text>
</svg>
