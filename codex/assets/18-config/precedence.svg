<svg viewBox="0 0 760 800" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
  </marker>
  <marker id="arrow-down" markerWidth="11" markerHeight="9" refX="5.5" refY="8" orient="auto">
    <polygon points="0 0, 11 0, 5.5 9" fill="#f59e0b"/>
  </marker>
  <linearGradient id="prioBar" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fb7185"/>
    <stop offset="50%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#475569"/>
  </linearGradient>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- layer overlap arrows (drawn first, ends hidden by mask + box) -->
<line x1="385" y1="166" x2="385" y2="204" stroke="#fb923c" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="385" y1="270" x2="385" y2="308" stroke="#fb923c" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="385" y1="374" x2="385" y2="412" stroke="#fb923c" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="385" y1="478" x2="385" y2="516" stroke="#fb923c" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="385" y1="582" x2="385" y2="620" stroke="#fb923c" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- arrow side labels -->
<text x="396" y="190" fill="#fdba74" font-size="8" font-weight="500">覆盖同名键</text>
<text x="396" y="294" fill="#fdba74" font-size="8" font-weight="500">覆盖同名键</text>
<text x="396" y="398" fill="#fdba74" font-size="8" font-weight="500">覆盖同名键</text>
<text x="396" y="502" fill="#fdba74" font-size="8" font-weight="500">覆盖同名键</text>
<text x="396" y="606" fill="#fdba74" font-size="8" font-weight="500">覆盖同名键</text>

<!-- masking rects (opaque base hides arrows under boxes) -->
<rect x="165" y="100" width="440" height="66" rx="8" fill="#0f172a"/>
<rect x="165" y="204" width="440" height="66" rx="8" fill="#0f172a"/>
<rect x="165" y="308" width="440" height="66" rx="8" fill="#0f172a"/>
<rect x="165" y="412" width="440" height="66" rx="8" fill="#0f172a"/>
<rect x="165" y="516" width="440" height="66" rx="8" fill="#0f172a"/>
<rect x="165" y="620" width="440" height="66" rx="8" fill="#0f172a"/>

<!-- layer 1: cli flags (highlight / blue, most specific) -->
<rect x="165" y="100" width="440" height="66" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<circle cx="190" cy="133" r="13" fill="rgba(59,130,246,0.5)" stroke="#60a5fa" stroke-width="1.5"/>
<text x="190" y="137" fill="white" font-size="12" font-weight="700" text-anchor="middle">1</text>
<text x="222" y="128" fill="white" font-size="13" font-weight="600">命令行参数 / --config</text>
<text x="222" y="148" fill="#bfdbfe" font-size="9">这次启动临时拍的板 —— 只管这一次</text>
<text x="585" y="138" fill="#60a5fa" font-size="9" font-weight="600" text-anchor="end">最高</text>

<!-- layer 2: project level (primary / cyan) -->
<rect x="165" y="204" width="440" height="66" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<circle cx="190" cy="237" r="13" fill="rgba(8,51,68,0.7)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="190" y="241" fill="white" font-size="12" font-weight="700" text-anchor="middle">2</text>
<text x="222" y="232" fill="white" font-size="13" font-weight="600">项目级 .codex/config.toml</text>
<text x="222" y="252" fill="#94a3b8" font-size="9">这个项目的设置 —— 信任才算，越近越赢</text>

<!-- layer 3: profile preset (secondary / emerald) -->
<rect x="165" y="308" width="440" height="66" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<circle cx="190" cy="341" r="13" fill="rgba(6,78,59,0.7)" stroke="#34d399" stroke-width="1.5"/>
<text x="190" y="345" fill="white" font-size="12" font-weight="700" text-anchor="middle">3</text>
<text x="222" y="336" fill="white" font-size="13" font-weight="600">--profile 预设档</text>
<text x="222" y="356" fill="#94a3b8" font-size="9">你切到的那套命名配置 ~/.codex/名字.config.toml</text>

<!-- layer 4: user level (tertiary / violet) -->
<rect x="165" y="412" width="440" height="66" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<circle cx="190" cy="445" r="13" fill="rgba(76,29,149,0.7)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="190" y="449" fill="white" font-size="12" font-weight="700" text-anchor="middle">4</text>
<text x="222" y="440" fill="white" font-size="13" font-weight="600">用户级 ~/.codex/config.toml</text>
<text x="222" y="460" fill="#94a3b8" font-size="9">你的全局默认 —— 跨所有项目都在</text>

<!-- layer 5: system level (accent / amber) -->
<rect x="165" y="516" width="440" height="66" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<circle cx="190" cy="549" r="13" fill="rgba(120,53,15,0.55)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="190" y="553" fill="white" font-size="12" font-weight="700" text-anchor="middle">5</text>
<text x="222" y="544" fill="white" font-size="13" font-weight="600">系统级 /etc/codex/config.toml</text>
<text x="222" y="564" fill="#94a3b8" font-size="9">管理员给整机定的（Unix，若有）</text>

<!-- layer 6: builtin defaults (neutral / slate, fallback) -->
<rect x="165" y="620" width="440" height="66" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
<circle cx="190" cy="653" r="13" fill="rgba(30,41,59,0.85)" stroke="#94a3b8" stroke-width="1.5"/>
<text x="190" y="657" fill="white" font-size="12" font-weight="700" text-anchor="middle">6</text>
<text x="222" y="648" fill="white" font-size="13" font-weight="600">内置默认值</text>
<text x="222" y="668" fill="#94a3b8" font-size="9">你啥都没写时 Codex 自带的兜底</text>
<text x="585" y="658" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="end">最低</text>

<!-- left priority ruler (high to low) -->
<rect x="70" y="100" width="10" height="586" rx="5" fill="url(#prioBar)"/>
<line x1="75" y1="118" x2="75" y2="668" stroke="#f59e0b" stroke-width="1.4" marker-end="url(#arrow-down)" stroke-opacity="0.9"/>
<text x="118" y="106" fill="#fb7185" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(0)">优先级 高</text>
<text x="118" y="684" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="middle">优先级 低</text>
<text x="48" y="400" fill="#cbd5e1" font-size="10" font-weight="600" text-anchor="middle" transform="rotate(-90, 48, 400)">越具体到当下越大 · 越全局兜底越小</text>

<!-- title block -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">config.toml · 六层优先级（高压低）</text>
<text x="30" y="62" fill="#94a3b8" font-size="9">多份配置叠在一起时，上层覆盖下层写了同一个键的部分</text>

<!-- bottom note -->
<text x="385" y="730" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">同一个键多处都写了 —— 谁更靠上（更具体）就听谁的</text>
</svg>
