<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
  </marker>
  <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- ===== 连线层（先画，后被 masking rect 盖住框内段） ===== -->
<!-- 源 → 记忆系统（向下喂料） -->
<line x1="240" y1="154" x2="240" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="680" y1="154" x2="680" y2="240" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Chronicle 也是给 Memories 补料：横向虚线箭头 -->
<line x1="530" y1="305" x2="390" y2="305" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-amber)"/>
<text x="460" y="297" fill="#fbbf24" font-size="8" text-anchor="middle">屏幕上下文补料</text>
<!-- 两套记忆 → 新会话上下文（向下汇聚，L 形） -->
<path d="M 240 370 L 240 430 L 460 430 L 460 470" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
<path d="M 680 370 L 680 430 L 460 430 L 460 470" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

<!-- ===== masking rects（opaque，盖住框内连线） ===== -->
<rect x="90" y="90" width="300" height="64" rx="8" fill="#0f172a"/>
<rect x="530" y="90" width="300" height="64" rx="8" fill="#0f172a"/>
<rect x="90" y="240" width="300" height="130" rx="10" fill="#0f172a"/>
<rect x="530" y="240" width="300" height="130" rx="10" fill="#0f172a"/>
<rect x="300" y="470" width="320" height="72" rx="10" fill="#0f172a"/>

<!-- ===== 组件框层 ===== -->

<!-- 源 1：对话（primary / cyan） -->
<rect x="90" y="90" width="300" height="64" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="240" y="118" fill="white" font-size="12" font-weight="600" text-anchor="middle">你和 Codex 的对话</text>
<text x="240" y="138" fill="#94a3b8" font-size="9" text-anchor="middle">你纠正它、交代偏好的过往会话</text>

<!-- 源 2：屏幕内容（alert / rose，风险面） -->
<rect x="530" y="90" width="300" height="64" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
<text x="680" y="118" fill="white" font-size="12" font-weight="600" text-anchor="middle">你的屏幕内容</text>
<text x="680" y="138" fill="#94a3b8" font-size="9" text-anchor="middle">截屏 · 风险更大（提示注入）</text>

<!-- 记忆系统 1：Memories（secondary / emerald） -->
<rect x="90" y="240" width="300" height="130" rx="10" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="240" y="270" fill="white" font-size="14" font-weight="700" text-anchor="middle">Memories（记忆）</text>
<text x="240" y="291" fill="#cbd5e1" font-size="9" text-anchor="middle">跨会话攒项目经验 · 后台异步生成</text>
<line x1="110" y1="304" x2="370" y2="304" stroke="#34d399" stroke-width="0.75" stroke-opacity="0.5"/>
<text x="240" y="324" fill="#94a3b8" font-size="9" text-anchor="middle">存 ~/.codex/memories/</text>
<text x="240" y="344" fill="#94a3b8" font-size="9" text-anchor="middle">默认关 · 写 memories = true 开</text>
<text x="240" y="362" fill="#64748b" font-size="8" text-anchor="middle">EEA / 英国 / 瑞士用不了</text>

<!-- 记忆系统 2：Chronicle（accent / amber，实验性） -->
<rect x="530" y="240" width="300" height="130" rx="10" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="680" y="270" fill="white" font-size="14" font-weight="700" text-anchor="middle">Chronicle</text>
<text x="680" y="291" fill="#cbd5e1" font-size="9" text-anchor="middle">用屏幕上下文建记忆 · 实验性研究预览</text>
<line x1="550" y1="304" x2="810" y2="304" stroke="#fbbf24" stroke-width="0.75" stroke-opacity="0.5"/>
<text x="680" y="324" fill="#94a3b8" font-size="9" text-anchor="middle">存 ~/.codex/memories_extensions/chronicle/</text>
<text x="680" y="344" fill="#94a3b8" font-size="9" text-anchor="middle">仅 Pro + macOS · 设置里开</text>
<text x="680" y="362" fill="#64748b" font-size="8" text-anchor="middle">不含 EU / UK / 瑞士 · 可 Pause</text>

<!-- 出口：新会话的上下文（highlight / blue） -->
<rect x="300" y="470" width="320" height="72" rx="10" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="460" y="502" fill="white" font-size="13" font-weight="700" text-anchor="middle">新会话的上下文</text>
<text x="460" y="523" fill="#cbd5e1" font-size="9" text-anchor="middle">Codex 一开工就「记得你」</text>

<!-- ===== 标题 ===== -->
<text x="30" y="40" fill="white" font-size="16" font-weight="700">Codex 记忆系统 · 两套各管各的</text>
<text x="30" y="58" fill="#94a3b8" font-size="9">Memories 从对话学，Chronicle 从屏幕学，都汇进下次开工的上下文</text>

<!-- ===== 图例（右下，所有边界之外） ===== -->
<rect x="640" y="566" width="14" height="10" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
<text x="660" y="575" fill="#94a3b8" font-size="8">正式可用</text>
<rect x="730" y="566" width="14" height="10" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
<text x="750" y="575" fill="#94a3b8" font-size="8">实验性</text>
</svg>
