<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 连线：中心 Codex 到四个入口（虚线，表示同源） -->
<line x1="440" y1="282" x2="175" y2="132" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="440" y1="282" x2="705" y2="132" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="440" y1="282" x2="175" y2="432" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="440" y1="282" x2="705" y2="432" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- masking rects（盖住框内的连线） -->
<rect x="70" y="90" width="210" height="84" rx="8" fill="#0f172a"/>
<rect x="600" y="90" width="210" height="84" rx="8" fill="#0f172a"/>
<rect x="70" y="390" width="210" height="84" rx="8" fill="#0f172a"/>
<rect x="600" y="390" width="210" height="84" rx="8" fill="#0f172a"/>
<rect x="368" y="248" width="144" height="68" rx="10" fill="#0f172a"/>

<!-- 桌面 App（primary / cyan） -->
<rect x="70" y="90" width="210" height="84" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="175" y="120" fill="white" font-size="13" font-weight="600" text-anchor="middle">桌面 App</text>
<text x="175" y="142" fill="#94a3b8" font-size="9" text-anchor="middle">图形界面 · 官方主线</text>
<text x="175" y="158" fill="#94a3b8" font-size="9" text-anchor="middle">macOS / Windows</text>

<!-- CLI（secondary / emerald） -->
<rect x="600" y="90" width="210" height="84" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="705" y="120" fill="white" font-size="13" font-weight="600" text-anchor="middle">CLI 命令行</text>
<text x="705" y="142" fill="#94a3b8" font-size="9" text-anchor="middle">终端里敲 codex</text>
<text x="705" y="158" fill="#94a3b8" font-size="9" text-anchor="middle">开发者最常用</text>

<!-- IDE 扩展（tertiary / violet） -->
<rect x="70" y="390" width="210" height="84" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="175" y="420" fill="white" font-size="13" font-weight="600" text-anchor="middle">IDE 扩展</text>
<text x="175" y="442" fill="#94a3b8" font-size="9" text-anchor="middle">VS Code / Cursor 侧边栏</text>
<text x="175" y="458" fill="#94a3b8" font-size="9" text-anchor="middle">写代码时顺手</text>

<!-- 云端 Web（accent / amber） -->
<rect x="600" y="390" width="210" height="84" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="705" y="420" fill="white" font-size="13" font-weight="600" text-anchor="middle">云端 Web</text>
<text x="705" y="442" fill="#94a3b8" font-size="9" text-anchor="middle">chatgpt.com/codex</text>
<text x="705" y="458" fill="#94a3b8" font-size="9" text-anchor="middle">浏览器里后台跑</text>

<!-- 中心 Codex（highlight / blue） -->
<rect x="368" y="248" width="144" height="68" rx="10" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="440" y="280" fill="white" font-size="16" font-weight="700" text-anchor="middle">Codex</text>
<text x="440" y="299" fill="#cbd5e1" font-size="9" text-anchor="middle">OpenAI 编程代理</text>

<!-- 标题 -->
<text x="30" y="40" fill="white" font-size="16" font-weight="700">Codex · 四种入口</text>
<text x="30" y="58" fill="#94a3b8" font-size="9">一套工具，四个入口，按场景挑</text>

<!-- 底部注解 -->
<text x="440" y="522" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">同一账号四端登录互通 —— 一处建的项目和任务，换个入口也能接着用</text>
</svg>
