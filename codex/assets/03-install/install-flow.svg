<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
  </marker>
  <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 两条泳道边界 -->
<rect x="75" y="100" width="280" height="356" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
<rect x="505" y="100" width="280" height="356" rx="12" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>

<!-- 连线：桌面 App 线（cyan，纵向） -->
<line x1="215" y1="176" x2="215" y2="226" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
<line x1="215" y1="300" x2="215" y2="358" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

<!-- 连线：CLI 线（emerald，纵向） -->
<line x1="645" y1="176" x2="645" y2="226" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
<line x1="645" y1="300" x2="645" y2="358" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

<!-- 汇合连线：两条登录步骤 → 登录成功（L 形） -->
<path d="M 215 432 L 215 488 L 305 488" fill="none" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
<path d="M 645 432 L 645 488 L 555 488" fill="none" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

<!-- ===== masking rects（盖住框下连线） ===== -->
<rect x="95" y="128" width="240" height="48" rx="24" fill="#0f172a"/>
<rect x="95" y="228" width="240" height="72" rx="6" fill="#0f172a"/>
<rect x="95" y="360" width="240" height="72" rx="6" fill="#0f172a"/>
<rect x="525" y="128" width="240" height="48" rx="24" fill="#0f172a"/>
<rect x="525" y="228" width="240" height="72" rx="6" fill="#0f172a"/>
<rect x="525" y="360" width="240" height="72" rx="6" fill="#0f172a"/>
<rect x="305" y="456" width="250" height="64" rx="24" fill="#0f172a"/>

<!-- ===== 桌面 App 线（cyan / primary） ===== -->
<!-- start -->
<rect x="95" y="128" width="240" height="48" rx="24" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="215" y="157" fill="white" font-size="12" font-weight="600" text-anchor="middle">桌面 App 线（Mac / Win）</text>

<!-- step 1 -->
<rect x="95" y="228" width="240" height="72" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="215" y="258" fill="white" font-size="12" font-weight="600" text-anchor="middle">下载安装包 → 打开</text>
<text x="215" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">chatgpt.com/codex</text>
<text x="215" y="292" fill="#94a3b8" font-size="9" text-anchor="middle">Mac 分清 Intel / Apple Silicon</text>

<!-- step 2 -->
<rect x="95" y="360" width="240" height="72" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="215" y="390" fill="white" font-size="12" font-weight="600" text-anchor="middle">在 App 内登录</text>
<text x="215" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">ChatGPT 账号 / API key</text>
<text x="215" y="424" fill="#94a3b8" font-size="9" text-anchor="middle">选项目文件夹 → 确认 Local</text>

<!-- ===== CLI 线（emerald / secondary） ===== -->
<!-- start -->
<rect x="525" y="128" width="240" height="48" rx="24" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="645" y="157" fill="white" font-size="12" font-weight="600" text-anchor="middle">CLI 线（三平台全有）</text>

<!-- step 1 -->
<rect x="525" y="228" width="240" height="72" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="645" y="254" fill="white" font-size="12" font-weight="600" text-anchor="middle">安装 codex</text>
<text x="645" y="274" fill="#94a3b8" font-size="9" text-anchor="middle">官方脚本 curl ... | sh（首选）</text>
<text x="645" y="288" fill="#94a3b8" font-size="9" text-anchor="middle">备选 npm / brew · Win 用 irm</text>

<!-- step 2 -->
<rect x="525" y="360" width="240" height="72" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="645" y="386" fill="white" font-size="12" font-weight="600" text-anchor="middle">codex login</text>
<text x="645" y="406" fill="#94a3b8" font-size="9" text-anchor="middle">ChatGPT 账号 / API key</text>
<text x="645" y="420" fill="#94a3b8" font-size="9" text-anchor="middle">远程 / 服务器用 --device-auth</text>

<!-- ===== 汇合节点（highlight / blue） ===== -->
<rect x="305" y="456" width="250" height="64" rx="24" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="430" y="486" fill="white" font-size="14" font-weight="700" text-anchor="middle">登录成功，可用</text>
<text x="430" y="506" fill="#cbd5e1" font-size="9" text-anchor="middle">codex --version 出版本号即装成</text>

<!-- 泳道标签 -->
<text x="87" y="120" fill="#22d3ee" font-size="9" font-weight="600">图形界面入门</text>
<text x="517" y="120" fill="#34d399" font-size="9" font-weight="600">终端 · 开发者首选</text>

<!-- 标题 -->
<text x="30" y="40" fill="white" font-size="16" font-weight="700">Codex 安装与登录 · 两条线</text>
<text x="30" y="58" fill="#94a3b8" font-size="9">桌面 App 与 CLI 各走各的，最后都汇到「登录成功、可用」</text>

<!-- 底部注解 -->
<text x="430" y="560" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">CLI 与 IDE 扩展共享登录态 · 桌面 App 各自登录</text>
<text x="430" y="582" fill="#64748b" font-size="9" text-anchor="middle">国内访问 chatgpt.com 多数情况下需要魔法上网</text>
</svg>
