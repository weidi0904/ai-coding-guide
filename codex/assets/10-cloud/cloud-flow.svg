<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-amber" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0, 9 3.5, 0 7" fill="#fbbf24"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- ===== 连线（先画，后面用 masking rect 盖住框内部分） ===== -->
<!-- 1. 连接仓库 → 配云端环境 -->
<line x1="250" y1="149" x2="372" y2="149" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- 2. 配云端环境 → 派任务 -->
<line x1="580" y1="149" x2="702" y2="149" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- 3. 配云端环境 ↓ 包含的三项（虚线，表示「环境里要配这些」） -->
<line x1="480" y1="188" x2="480" y2="234" stroke="#fbbf24" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
<!-- 4. 派任务 ↓ 云端容器里跑 -->
<line x1="810" y1="188" x2="810" y2="454" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- 5. 云端容器里跑 → 看 diff（往左） -->
<line x1="710" y1="499" x2="588" y2="499" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- 6. 看 diff → 提 PR（往左） -->
<line x1="380" y1="499" x2="258" y2="499" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== masking rects（不透明底，挡住框内连线） ===== -->
<rect x="50" y="110" width="200" height="78" rx="25" fill="#0f172a"/>
<rect x="380" y="110" width="200" height="78" rx="6" fill="#0f172a"/>
<rect x="710" y="110" width="200" height="78" rx="6" fill="#0f172a"/>
<rect x="710" y="460" width="200" height="78" rx="6" fill="#0f172a"/>
<rect x="380" y="460" width="200" height="78" rx="6" fill="#0f172a"/>
<rect x="50" y="460" width="200" height="78" rx="25" fill="#0f172a"/>

<!-- ===== 环境配置子项的虚线分组框 ===== -->
<rect x="338" y="234" width="284" height="158" rx="12" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
<text x="350" y="252" fill="#fbbf24" font-size="9" font-weight="600">环境里要配的三样</text>

<!-- ===== 节点框（半透明，按角色配色） ===== -->

<!-- 1. 连接仓库 — 起点 / highlight 蓝 -->
<rect x="50" y="110" width="200" height="78" rx="25" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="150" y="143" fill="white" font-size="13" font-weight="600" text-anchor="middle">连接仓库</text>
<text x="150" y="164" fill="#cbd5e1" font-size="9" text-anchor="middle">授权 GitHub · 选要干的库</text>

<!-- 2. 配云端环境 — secondary 翠绿 -->
<rect x="380" y="110" width="200" height="78" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="480" y="143" fill="white" font-size="13" font-weight="600" text-anchor="middle">配云端环境</text>
<text x="480" y="164" fill="#94a3b8" font-size="9" text-anchor="middle">Environments 设置页</text>

<!-- 3. 派任务（可并行） — process / cyan -->
<rect x="710" y="110" width="200" height="78" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="810" y="143" fill="white" font-size="13" font-weight="600" text-anchor="middle">派任务（可并行）</text>
<text x="810" y="164" fill="#94a3b8" font-size="9" text-anchor="middle">一句话能验收 · 多任务齐开</text>

<!-- 环境子项 1：依赖 -->
<rect x="360" y="266" width="240" height="32" rx="5" fill="#0f172a"/>
<rect x="360" y="266" width="240" height="32" rx="5" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.2"/>
<text x="480" y="287" fill="#fde68a" font-size="10" font-weight="500" text-anchor="middle">依赖 · 设置脚本装包</text>

<!-- 环境子项 2：运行时 -->
<rect x="360" y="308" width="240" height="32" rx="5" fill="#0f172a"/>
<rect x="360" y="308" width="240" height="32" rx="5" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.2"/>
<text x="480" y="329" fill="#fde68a" font-size="10" font-weight="500" text-anchor="middle">运行时 · 钉死版本</text>

<!-- 环境子项 3：网络白名单 -->
<rect x="360" y="350" width="240" height="32" rx="5" fill="#0f172a"/>
<rect x="360" y="350" width="240" height="32" rx="5" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.2"/>
<text x="480" y="371" fill="#fecdd3" font-size="10" font-weight="500" text-anchor="middle">网络白名单 · 默认断网</text>

<!-- 4. 云端容器里跑 — tertiary 紫 -->
<rect x="710" y="460" width="200" height="78" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="810" y="493" fill="white" font-size="13" font-weight="600" text-anchor="middle">云端容器里跑</text>
<text x="810" y="514" fill="#94a3b8" font-size="9" text-anchor="middle">隔离容器 · 读 AGENTS.md</text>

<!-- 5. 看 diff — accent 琥珀 -->
<rect x="380" y="460" width="200" height="78" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="480" y="493" fill="white" font-size="13" font-weight="600" text-anchor="middle">看 diff</text>
<text x="480" y="514" fill="#94a3b8" font-size="9" text-anchor="middle">确认只动了该动的文件</text>

<!-- 6. 提 PR — 终点 / highlight 蓝 -->
<rect x="50" y="460" width="200" height="78" rx="25" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="150" y="493" fill="white" font-size="13" font-weight="600" text-anchor="middle">提 PR</text>
<text x="150" y="514" fill="#cbd5e1" font-size="9" text-anchor="middle">开拉取请求 · 或追问再改</text>

<!-- ===== 标题 ===== -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">云端 Codex · 一条端到端流水线</text>
<text x="30" y="62" fill="#94a3b8" font-size="9">连仓库 → 配环境 → 派活（可并行）→ 云上跑 → 看 diff → 提 PR</text>

<!-- ===== 底部注解 ===== -->
<text x="480" y="592" fill="#60a5fa" font-size="10" font-weight="500" text-anchor="middle">全程跑在 OpenAI 云上 —— 派完活你电脑就能关，回头收 diff</text>
</svg>
