<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
  </marker>
  <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 连线层：Codex <-> MCP hub（双向，cyan） -->
<line x1="290" y1="290" x2="362" y2="290" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
<line x1="362" y1="306" x2="290" y2="306" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)" stroke-opacity="0.55"/>

<!-- 连线层：MCP hub -> 四个外部 server（orange，L 形分叉，像 USB hub 分线） -->
<path d="M 444 280 L 600 280 L 600 120 L 648 120" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
<path d="M 444 290 L 624 290 L 624 232 L 648 232" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
<path d="M 444 306 L 624 306 L 624 368 L 648 368" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
<path d="M 444 316 L 600 316 L 600 480 L 648 480" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>

<!-- ===== masking rects（不透明底，盖住框内连线） ===== -->
<rect x="120" y="252" width="170" height="92" rx="10" fill="#0f172a"/>
<rect x="362" y="236" width="82" height="124" rx="8" fill="#0f172a"/>
<rect x="648" y="84" width="200" height="72" rx="8" fill="#0f172a"/>
<rect x="648" y="196" width="200" height="72" rx="8" fill="#0f172a"/>
<rect x="648" y="332" width="200" height="72" rx="8" fill="#0f172a"/>
<rect x="648" y="444" width="200" height="72" rx="8" fill="#0f172a"/>

<!-- ===== 组件层 ===== -->

<!-- 中心：Codex（highlight / blue） -->
<rect x="120" y="252" width="170" height="92" rx="10" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
<text x="205" y="290" fill="white" font-size="17" font-weight="700" text-anchor="middle">Codex</text>
<text x="205" y="311" fill="#cbd5e1" font-size="9" text-anchor="middle">本地编程代理</text>
<text x="205" y="326" fill="#94a3b8" font-size="9" text-anchor="middle">读写文件 / 跑命令</text>

<!-- MCP hub（connector / orange，竖条，像转接头） -->
<rect x="362" y="236" width="82" height="124" rx="8" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="2"/>
<text x="403" y="284" fill="white" font-size="14" font-weight="700" text-anchor="middle">MCP</text>
<text x="403" y="304" fill="#fdba74" font-size="8.5" text-anchor="middle">统一插头</text>
<text x="403" y="318" fill="#fdba74" font-size="8.5" text-anchor="middle">标准</text>
<text x="403" y="338" fill="#94a3b8" font-size="8" text-anchor="middle">USB hub</text>

<!-- server 1：GitHub（secondary / emerald） -->
<rect x="648" y="84" width="200" height="72" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="748" y="116" fill="white" font-size="12" font-weight="600" text-anchor="middle">GitHub</text>
<text x="748" y="136" fill="#94a3b8" font-size="9" text-anchor="middle">读仓库 / 提 PR / 看 issue</text>

<!-- server 2：数据库（tertiary / violet） -->
<rect x="648" y="196" width="200" height="72" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="748" y="228" fill="white" font-size="12" font-weight="600" text-anchor="middle">数据库</text>
<text x="748" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">查表 / 跑只读 SQL</text>

<!-- server 3：网页搜索（primary / cyan） -->
<rect x="648" y="332" width="200" height="72" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="748" y="364" fill="white" font-size="12" font-weight="600" text-anchor="middle">网页搜索</text>
<text x="748" y="384" fill="#94a3b8" font-size="9" text-anchor="middle">查实时网页 / 最新文档</text>

<!-- server 4：第三方 API（accent / amber） -->
<rect x="648" y="444" width="200" height="72" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="748" y="476" fill="white" font-size="12" font-weight="600" text-anchor="middle">第三方 API</text>
<text x="748" y="496" fill="#94a3b8" font-size="9" text-anchor="middle">Figma / Sentry / 浏览器…</text>

<!-- 标题块 -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">MCP · 给 Codex 接外部工具的统一插头</text>
<text x="30" y="61" fill="#94a3b8" font-size="9.5">接一次，一堆外部 server 全摆到它面前 —— 像 USB hub 统一对接</text>

<!-- 底部注解 -->
<text x="450" y="560" fill="#fb923c" font-size="10" font-weight="500" text-anchor="middle">本地能力只够得着左侧的文件和命令；右侧这些外部 server，全靠中间 MCP 这个口子接进来</text>
</svg>
