<svg viewBox="0 0 940 600" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow-blue" markerWidth="11" markerHeight="8" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 阶段间过渡箭头（先画，后面用 masking rect 盖住穿过框的部分） -->
<line x1="430" y1="320" x2="498" y2="320" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

<!-- ===== 两个阶段的虚线区域边界 ===== -->
<rect x="50" y="92" width="380" height="430" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
<text x="64" y="114" fill="#22d3ee" font-size="11" font-weight="600">阶段一 · 启动时：只加载「清单」</text>

<rect x="510" y="92" width="380" height="430" rx="12" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
<text x="524" y="114" fill="#34d399" font-size="11" font-weight="600">阶段二 · 被触发时：读 SKILL.md 全文</text>

<!-- ===== 阶段一：三个 Skill，只占 名称+描述+路径 ===== -->
<!-- masking rects -->
<rect x="74" y="140" width="332" height="62" rx="6" fill="#0f172a"/>
<rect x="74" y="218" width="332" height="62" rx="6" fill="#0f172a"/>
<rect x="74" y="296" width="332" height="62" rx="6" fill="#0f172a"/>

<!-- Skill A（命中项，highlight 蓝） -->
<rect x="74" y="140" width="332" height="62" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
<text x="88" y="162" fill="white" font-size="12" font-weight="600">$commit · name</text>
<text x="88" y="180" fill="#94a3b8" font-size="9">description：总结未提交改动并标出风险…</text>
<text x="88" y="195" fill="#64748b" font-size="8">path: .agents/skills/commit/SKILL.md</text>

<!-- Skill B（cyan） -->
<rect x="74" y="218" width="332" height="62" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="88" y="240" fill="white" font-size="12" font-weight="600">$api-conventions · name</text>
<text x="88" y="258" fill="#94a3b8" font-size="9">description：按团队约定写 API…</text>
<text x="88" y="273" fill="#64748b" font-size="8">path: .agents/skills/api-conventions/SKILL.md</text>

<!-- Skill C（emerald） -->
<rect x="74" y="296" width="332" height="62" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="88" y="318" fill="white" font-size="12" font-weight="600">$release · name</text>
<text x="88" y="336" fill="#94a3b8" font-size="9">description：发版前自查清单…</text>
<text x="88" y="351" fill="#64748b" font-size="8">path: .agents/skills/release/SKILL.md</text>

<!-- 阶段一上下文占用条 -->
<text x="88" y="392" fill="#cbd5e1" font-size="10" font-weight="600">初始清单上下文占用</text>
<rect x="88" y="402" width="304" height="16" rx="4" fill="#0f172a"/>
<rect x="88" y="402" width="304" height="16" rx="4" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1"/>
<rect x="88" y="402" width="22" height="16" rx="4" fill="rgba(120,53,15,0.5)" stroke="#fbbf24" stroke-width="1"/>
<text x="118" y="414" fill="#fbbf24" font-size="9" font-weight="600">≈ 2%</text>
<text x="88" y="442" fill="#94a3b8" font-size="9">每个 Skill 只露：名称 + 一句描述 + 文件路径</text>
<text x="88" y="458" fill="#94a3b8" font-size="9">正文一律不读，所以装再多也几乎不占工作台</text>
<text x="88" y="490" fill="#fb923c" font-size="9" font-weight="500">上限：约 2% 或 8000 字符，超了先压缩描述</text>
<text x="88" y="506" fill="#fb923c" font-size="9" font-weight="500">→ 核心触发词务必前置，免得被削没</text>

<!-- ===== 阶段二：命中的 Skill 展开全文 ===== -->
<rect x="534" y="140" width="332" height="218" rx="6" fill="#0f172a"/>
<rect x="534" y="140" width="332" height="218" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
<text x="548" y="163" fill="white" font-size="12" font-weight="600">$commit — 完整 SKILL.md 被读入</text>
<line x1="548" y1="173" x2="852" y2="173" stroke="#60a5fa" stroke-width="0.8" stroke-dasharray="3,3"/>
<text x="548" y="191" fill="#cbd5e1" font-size="9">--- frontmatter ---</text>
<text x="548" y="207" fill="#94a3b8" font-size="9">name: commit</text>
<text x="548" y="223" fill="#94a3b8" font-size="9">description: 总结未提交改动并标出风险</text>
<text x="548" y="247" fill="#cbd5e1" font-size="9">--- 正文指令（用到才加载） ---</text>
<text x="548" y="263" fill="#94a3b8" font-size="9">1. 先跑测试套件，确认全绿</text>
<text x="548" y="279" fill="#94a3b8" font-size="9">2. 用中文写 commit，前缀 feat: / fix:</text>
<text x="548" y="295" fill="#94a3b8" font-size="9">3. 列出本次改动文件与风险点</text>
<text x="548" y="311" fill="#94a3b8" font-size="9">4. 待我确认后再 commit，不擅自 push</text>
<text x="548" y="335" fill="#64748b" font-size="8">references/ · scripts/ 也在此刻按需取用</text>

<!-- 阶段二说明 -->
<text x="534" y="392" fill="#cbd5e1" font-size="10" font-weight="600">只有这一个被命中的 Skill 展开</text>
<text x="534" y="412" fill="#94a3b8" font-size="9">其余 Skill 的正文照旧不读，清单里仍各占一行</text>
<text x="534" y="436" fill="#34d399" font-size="9" font-weight="500">长检查清单 / 详细参考可以放心写进正文</text>
<text x="534" y="452" fill="#34d399" font-size="9" font-weight="500">用到之前几乎零成本</text>

<!-- 过渡箭头标签（最后画，盖在最上层不被框遮） -->
<text x="464" y="306" fill="#60a5fa" font-size="9" font-weight="600" text-anchor="middle">任务命中</text>
<text x="464" y="318" fill="#60a5fa" font-size="9" font-weight="600" text-anchor="middle">description</text>
<text x="464" y="342" fill="#94a3b8" font-size="8" text-anchor="middle">才展开</text>

<!-- ===== 标题 ===== -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">Skills · 渐进式披露的两个阶段</text>
<text x="30" y="60" fill="#94a3b8" font-size="9">平时只露一句描述，用到才读全文 —— 装再多也不撑爆上下文</text>

<!-- ===== 底部注解 ===== -->
<text x="470" y="556" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">省上下文的秘密：清单常驻（约 2%），SKILL.md 全文按需加载、用完即走</text>
</svg>
