<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
</style>
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#0f172a"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- 入侵威胁箭头：从左侧打向最外层（被一层层挡下） -->
<line x1="40" y1="160" x2="196" y2="160" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow-rose)"/>
<text x="40" y="140" fill="#fb7185" font-size="10" font-weight="600">不可信输入</text>
<text x="40" y="125" fill="#94a3b8" font-size="8">恶意指令 / 陌生代码 / 网页内容</text>

<!-- ===== 嵌套分层：从外到内，层层把关 ===== -->

<!-- L1 沙箱隔离（最外层 · OS 强制 · amber） -->
<rect x="200" y="88" width="620" height="448" rx="14" fill="#0f172a"/>
<rect x="200" y="88" width="620" height="448" rx="14" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="220" y="112" fill="#fbbf24" font-size="12" font-weight="600">① 沙箱隔离　Sandbox</text>
<text x="220" y="128" fill="#94a3b8" font-size="8">操作系统强制的护栏 · 锁工作区 · 保护 .git</text>

<!-- L2 审批关卡（cyan） -->
<rect x="230" y="136" width="560" height="386" rx="12" fill="#0f172a"/>
<rect x="230" y="136" width="560" height="386" rx="12" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="250" y="160" fill="#22d3ee" font-size="12" font-weight="600">② 审批关卡　Approval</text>
<text x="250" y="176" fill="#94a3b8" font-size="8">出圈 / 联网 / 破坏性操作 → 停下来问你</text>

<!-- L3 规则限制 rules（orange） -->
<rect x="260" y="184" width="500" height="324" rx="11" fill="#0f172a"/>
<rect x="260" y="184" width="500" height="324" rx="11" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
<text x="280" y="208" fill="#fb923c" font-size="12" font-weight="600">③ 规则限制　Rules</text>
<text x="280" y="224" fill="#94a3b8" font-size="8">域名白名单 · deny 永远压过 allow · 少用 *</text>

<!-- L4 提示注入防范（violet） -->
<rect x="290" y="232" width="440" height="262" rx="10" fill="#0f172a"/>
<rect x="290" y="232" width="440" height="262" rx="10" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="310" y="256" fill="#a78bfa" font-size="12" font-weight="600">④ 提示注入防范</text>
<text x="310" y="272" fill="#94a3b8" font-size="8">网络默认关 · 网页搜索走缓存 · 内容当不可信</text>

<!-- L5 Codex Security 扫描（emerald） -->
<rect x="320" y="280" width="380" height="200" rx="10" fill="#0f172a"/>
<rect x="320" y="280" width="380" height="200" rx="10" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="340" y="304" fill="#34d399" font-size="12" font-weight="600">⑤ Codex Security 扫描</text>
<text x="340" y="320" fill="#94a3b8" font-size="8">主动查漏：本地扫 diff · 云端持续扫</text>

<!-- 核心：被保护的资产（rose） -->
<rect x="350" y="340" width="320" height="126" rx="10" fill="#0f172a"/>
<rect x="350" y="340" width="320" height="126" rx="10" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="2"/>
<text x="510" y="386" fill="white" font-size="15" font-weight="700" text-anchor="middle">你的代码与密钥</text>
<text x="510" y="408" fill="#cbd5e1" font-size="9" text-anchor="middle">.env · ~/.ssh · 云凭证 · 源码</text>
<text x="510" y="426" fill="#fb7185" font-size="8" text-anchor="middle">最里层 · 攻击者真正想要的东西</text>

<!-- 标题 -->
<text x="30" y="42" fill="white" font-size="16" font-weight="700">Codex 安全分层防护 · 层层把关</text>
<text x="30" y="60" fill="#94a3b8" font-size="9">从外到内五道关，前两道是机器强制的护栏与收费站，越往里越靠主动防范</text>

<!-- 底部注解 -->
<text x="510" y="616" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">前两层（沙箱 + 审批）程序强制兜底，但最后那一道闸永远是你批准前的那一眼</text>
</svg>
